services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345678"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      DOCTOR_DATABASE_URL: postgres://postgres:12345678@postgres:5432/doctor?sslmode=disable
      DOCTOR_GRPC_PORT: "50051"
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    ports:
      - "50052:50052"
    environment:
      APPOINTMENT_DATABASE_URL: postgres://postgres:12345678@postgres:5432/appointment?sslmode=disable
      APPOINTMENT_GRPC_PORT: "50052"
      DOCTOR_SERVICE_URL: doctor-service:50051
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      doctor-service:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started

volumes:
  postgres_data:
